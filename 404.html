<!DOCTYPE html>
<html lang="en">

    <script>
        (function () {

        })();

        html.dark { --p: #6b7ce8; --ph: #8b98f0; --bg: linear-gradient(180deg, #0c0f22 0%, #000000 100%); --heading: #fff; --body: #c9cbd6; --card-bg: rgba(255,255,255,.03); --card-border: rgba(255,255,255,.1) }

</head>
